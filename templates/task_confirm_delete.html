{% extends 'base.html' %}
{% block title %}Eliminar tarea{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card border-0 shadow-lg">
      <div class="card-body p-4 p-md-5 text-center">
        <h1 class="h3 fw-bold mb-3">Eliminar tarea</h1>
        <p class="text-muted">¿Seguro que deseas eliminar <strong>{{ task.title }}</strong>?</p>
        <form method="post" class="d-flex justify-content-center gap-2 mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-lg app-btn" aria-label="Sí, eliminar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 3h6v1h3v2H6V4h3V3z" fill="#fff"/><path d="M7 7h10v12a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V7z" fill="#fff"/><path d="M10 11v6M14 11v6" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <a class="btn btn-secondary btn-lg app-btn" href="{% url back_url %}" aria-label="Cancelar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 6l12 12M6 18L18 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
